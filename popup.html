<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #0f0f17;
      color: #e0e0f0;
      padding: 0;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 18px 14px;
      border-bottom: 1px solid #ffffff12;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 11px;
      color: #8888aa;
      margin-left: 38px;
    }

    .body {
      padding: 14px 16px;
    }

    .scope-toggle {
      display: flex;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 14px;
      gap: 2px;
    }

    .scope-btn {
      flex: 1;
      padding: 6px 8px;
      border: none;
      background: transparent;
      color: #8888aa;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .scope-btn.active {
      background: #6c63ff;
      color: #fff;
    }

    .categories-preview {
      margin-bottom: 14px;
    }

    .cat-label {
      font-size: 11px;
      color: #6668a0;
      margin-bottom: 7px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .cat-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1a1a2e;
      border-radius: 20px;
      padding: 3px 9px 3px 6px;
      font-size: 11px;
      color: #ccc;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-purple { background: #9c7ffa; }
    .dot-cyan   { background: #22d3ee; }
    .dot-blue   { background: #60a5fa; }
    .dot-red    { background: #f87171; }
    .dot-green  { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-orange { background: #fb923c; }
    .dot-pink   { background: #f472b6; }
    .dot-grey   { background: #9ca3af; }

    .action-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: white;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }

    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }
    .action-btn:disabled { background: #2a2a3e; color: #555; cursor: default; transform: none; }

    .undo-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #8888cc;
      margin-top: 7px;
      transition: all 0.15s;
      display: none;
    }

    .undo-btn:hover { background: #1a1a2e; color: #aaa; }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    .status.success { background: #0d2b0d; color: #6dff6d; display: block; border: 1px solid #1a4a1a; }
    .status.error   { background: #2b0d0d; color: #ff6d6d; display: block; border: 1px solid #4a1a1a; }
    .status.loading { background: #1a1a2e; color: #8888cc; display: block; border: 1px solid #2a2a4e; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #555;
      margin-top: 1px;
    }

    footer {
      padding: 10px 16px;
      border-top: 1px solid #ffffff08;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
    }

    .footer-link:hover { color: #8888cc; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #8888cc44;
      border-top-color: #8888cc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .auto-section {
      margin-top: 12px;
      border-top: 1px solid #ffffff08;
      padding-top: 12px;
    }

    .auto-label {
      font-size: 11px;
      color: #6668a0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .toggle-info { display: flex; flex-direction: column; gap: 1px; }
    .toggle-title { font-size: 12px; color: #ccc; font-weight: 500; }
    .toggle-sub   { font-size: 10px; color: #555; }

    .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2a2a4e;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #6c63ff; }
    input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">🗂️</div>
      <h1>Tab Tidy</h1>
    </div>
    <div class="tagline">Smart tab organizer</div>
  </header>

  <div class="body">
    <div class="scope-toggle">
      <button class="scope-btn active" data-scope="window">This Window</button>
      <button class="scope-btn" data-scope="all">All Windows</button>
    </div>

    <div class="categories-preview">
      <div class="cat-label">Will group into</div>
      <div class="cat-grid" id="catGrid">
        <!-- filled by JS -->
      </div>
    </div>

    <button class="action-btn" id="groupBtn">✦ Group Tabs</button>
    <button class="undo-btn" id="undoBtn">↩ Undo last grouping</button>
    <div class="status" id="status"></div>

    <div class="auto-section">
      <div class="auto-label">Auto-group</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-title">On browser startup</span>
          <span class="toggle-sub">Groups all tabs when Brave opens</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoStartup">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-title">As you browse</span>
          <span class="toggle-sub">Groups new tabs automatically</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoNewTab">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <footer>
    <span class="footer-link" id="optionsLink">⚙ Customize categories</span>
    <span style="font-size:11px;color:#333">Tab Tidy v1.0</span>
  </footer>

  <script src="categories.js"></script>
  <script src="popup.js"></script>
</body>
</html>
